name: backend-ci

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: mvn -f backend/pom.xml clean test

  image:
    if: github.ref == 'refs/heads/main'
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build image with Jib
        run: mvn -f backend/pom.xml -DskipTests -Djib.to.tags=latest,sha-${GITHUB_SHA} jib:build
        env:
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
      - name: Slack notify
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          STATUS="${{ job.status }}"
          TEXT="backend-ci image job: ${STATUS} (commit: ${GITHUB_SHA})"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${TEXT}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
